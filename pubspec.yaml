name: asr_live_translator
description: Live ASR transcripts with TTS, latest output only.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^4.0.1
  http: ^1.3.0
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.2
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  flutter_tts: ^3.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true