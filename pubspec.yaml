name: asr_live_translator
description: Live ASR transcripts with TTS, latest output only.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^4.0.1
  http: ^1.3.0
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.2
  wakelock: ^0.4.0          # for Keep Screen On
  package_info_plus: ^4.0.0 # for version info
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  flutter_tts: ^4.2.5
  audioplayers: ^5.2.0
  share_plus: ^7.2.1          # For sharing files
  path_provider: ^2.1.0       # For getting temporary directory 
  html: ^0.15.4     # for parsing HTML
  pdf: ^3.12.0
  printing: ^5.11.1           # For PDF generation support
  webview_flutter: ^2.8.0
  webview_flutter_windows: ^1.1.1
  flutter_secure_storage: ^9.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSansSC-Regular.ttf      # Simplified Chinese
    - assets/fonts/NotoSansTC-Regular.ttf      # Traditional Chinese
    - assets/fonts/NotoSansJP-Regular.ttf      # Japanese
    - assets/fonts/NotoSansKR-Regular.ttf      # Korean
    - assets/fonts/NotoSansArabic-Regular.ttf  # Arabic / Persian
