name: 0_build_7_days_test_IPA_for_iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build (7-days free testing)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter clean
      - run: flutter pub get

      # --- Add Firebase iOS configuration (required for Firebase Core/Auth/Firestore) ---
      - name: Create GoogleService-Info.plist
        run: |
          # Store your Firebase iOS plist as a GitHub secret named FIREBASE_IOS_PLIST
          echo "${{ secrets.FIREBASE_IOS_PLIST }}" > ios/Runner/GoogleService-Info.plist

      # --- Install Pods ---
      - name: Update CocoaPods repository with retry
        working-directory: ios
        run: |
          for i in {1..3}; do
            echo "Attempt $i: Updating CocoaPods repository..."
            pod repo update && break
            sleep 5
          done

      - name: Install CocoaPods dependencies with retry
        working-directory: ios
        run: |
          for i in {1..5}; do
            echo "Attempt $i: Running pod install..."
            pod install --repo-update && break
            echo "Retry in 10s..."
            sleep 10
          done

      # --- Build (unsigned) ---
      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      # --- Package IPA ---
      - name: Create Payload and IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 ../FlutterIpaExport.ipa Payload/
          ls -la ../FlutterIpaExport.ipa

      - name: Check IPA size
        run: |
          if [ -f "build/ios/FlutterIpaExport.ipa" ]; then
            SIZE=$(stat -f%z "build/ios/FlutterIpaExport.ipa")
            echo "IPA file size: $((SIZE / 1024 / 1024)) MB"
          else
            echo "ERROR: IPA file not found!"
            exit 1
          fi

      - name: Update outdated packages (optional)
        run: flutter pub outdated

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterIpaExport.ipa
          path: build/ios/FlutterIpaExport.ipa
          retention-days: 7
          