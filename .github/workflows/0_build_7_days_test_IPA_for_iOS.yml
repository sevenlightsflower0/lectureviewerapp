name: 0_build_7_days_test_IPA_for_iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build (7-days free testing)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter clean
      - run: flutter pub get

      # --- Regenerate iOS folder (ensures clean state) ---
      - name: Regenerate iOS folder
        run: |
          rm -rf ios
          flutter create --platforms=ios .

      # --- Patch Podfile to iOS 15.0 ---
      - name: Set iOS deployment target to 15.0 in Podfile
        run: |
          if [ ! -f "ios/Podfile" ]; then
            echo "ios/Podfile not found. Creating one..."
            cat > ios/Podfile << EOF
          platform :ios, '15.0'
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
            end
          end
          EOF
          else
            sed -i '' 's/platform :ios, .*/platform :ios, '\''15.0'\''/' ios/Podfile
          fi
          echo "Podfile platform set to 15.0"

      # --- Patch Xcode project deployment target to 15.0 ---
      - name: Set Xcode project deployment target to 15.0
        run: |
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"
          if [ -f "$PROJECT_FILE" ]; then
            # Replace all IPHONEOS_DEPLOYMENT_TARGET values with 15.0
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]\+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' "$PROJECT_FILE"
            # Also replace any deployment target in build settings
            sed -i '' 's/DEPLOYMENT_TARGET = [0-9.]\+;/DEPLOYMENT_TARGET = 15.0;/g' "$PROJECT_FILE"
            echo "Xcode project deployment target set to 15.0"
            grep -E "IPHONEOS_DEPLOYMENT_TARGET|DEPLOYMENT_TARGET" "$PROJECT_FILE" | head -5
          else
            echo "WARNING: project.pbxproj not found"
          fi

      # --- Create Firebase plist ---
      - name: Create GoogleService-Info.plist
        env:
          FIREBASE_IOS_PLIST: ${{ secrets.FIREBASE_IOS_PLIST }}
        run: |
          if [ -z "$FIREBASE_IOS_PLIST" ]; then
            echo "ERROR: FIREBASE_IOS_PLIST secret is not set."
            exit 1
          fi
          mkdir -p ios/Runner
          printf '%s' "$FIREBASE_IOS_PLIST" > ios/Runner/GoogleService-Info.plist

      # --- Install Pods ---
      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install --repo-update
      # --- Force iOS deployment target to 15.0 (Xcode + SPM) ---
      - name: Force iOS deployment target to 15.0
        run: |
          # Update Podfile
          sed -i '' 's/platform :ios, .*/platform :ios, '\''15.0'\''/' ios/Podfile || true

          # Patch Xcode project
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"
          if [ -f "$PROJECT_FILE" ]; then
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]\+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' "$PROJECT_FILE"
            sed -i '' 's/DEPLOYMENT_TARGET = [0-9.]\+;/DEPLOYMENT_TARGET = 15.0;/g' "$PROJECT_FILE"
          fi

          # Run config generation (triggers migration)
          flutter build ios --config-only --no-codesign

          # Safeguard: directly patch Package.swift
          PACKAGE_FILE="ios/Flutter/ephemeral/Packages/FlutterGeneratedPluginSwiftPackage/Package.swift"
          if [ -f "$PACKAGE_FILE" ]; then
            sed -i '' 's/.iOS("[0-9.]\+")/.iOS("15.0")/g' "$PACKAGE_FILE"
            echo "✅ Patched Package.swift to iOS 15.0"
          else
            echo "⚠️ Package.swift not found – migration may have failed"
            exit 1
          fi

      - name: Regenerate iOS folder
        run: |
          rm -rf ios
          flutter create --platforms=ios .

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

          
      # --- Package IPA ---
      - name: Create Payload and IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 ../FlutterIpaExport.ipa Payload/
          ls -la ../FlutterIpaExport.ipa

      - name: Check IPA size
        run: |
          if [ -f "build/ios/FlutterIpaExport.ipa" ]; then
            SIZE=$(stat -f%z "build/ios/FlutterIpaExport.ipa")
            echo "IPA file size: $((SIZE / 1024 / 1024)) MB"
          else
            echo "ERROR: IPA file not found!"
            exit 1
          fi

      - name: Update outdated packages (optional)
        run: flutter pub outdated

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterIpaExport.ipa
          path: build/ios/FlutterIpaExport.ipa
          retention-days: 7
          
