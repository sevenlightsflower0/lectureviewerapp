name: 0_build_7_days_test_IPA_for_iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build (7-days free testing)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter clean
      - run: flutter pub get

      # --- Create/Patch ios/Podfile to require iOS 15.0 (required by Firebase) ---
      - name: Set iOS deployment target to 15.0
        run: |
          # Ensure the ios folder exists
          mkdir -p ios
          # Generate a default Podfile if it doesn't exist
          if [ ! -f "ios/Podfile" ]; then
            echo "ios/Podfile not found. Creating one..."
            cat > ios/Podfile << EOF
          platform :ios, '13.0'
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
            end
          end
          EOF
          fi

          # Now patch it to set platform to 15.0 using a heredoc (no quote issues)
          echo "Patching ios/Podfile to set platform to 15.0..."
          python3 << 'PYTHON'
          import re
          with open('ios/Podfile', 'r') as f:
              content = f.read()
          # Replace any existing platform line with iOS 15.0
          pattern = r'^\s*#?\s*platform\s+:ios\s*,\s*[\'"](.*?)[\'"]'
          if re.search(pattern, content, re.MULTILINE):
              content = re.sub(pattern, "platform :ios, '15.0'", content, flags=re.MULTILINE)
          else:
              # If no platform line is found, insert it at the top
              content = "platform :ios, '15.0'\n" + content
          with open('ios/Podfile', 'w') as f:
              f.write(content)
          PYTHON

          # Verify the change
          echo "--- Updated Podfile platform setting: ---"
          grep "platform :ios" ios/Podfile || echo "WARNING: platform line not found!"

      # --- Add Firebase iOS configuration (required for Firebase Core/Auth/Firestore) ---
      - name: Create GoogleService-Info.plist
        env:
          FIREBASE_IOS_PLIST: ${{ secrets.FIREBASE_IOS_PLIST }}
        run: |
          if [ -z "$FIREBASE_IOS_PLIST" ]; then
            echo "ERROR: FIREBASE_IOS_PLIST secret is not set. Please add it."
            exit 1
          fi
          mkdir -p ios/Runner
          printf '%s' "$FIREBASE_IOS_PLIST" > ios/Runner/GoogleService-Info.plist

      # --- Install Pods ---
      - name: Update CocoaPods repository with retry
        working-directory: ios
        run: |
          for i in {1..3}; do
            echo "Attempt $i: Updating CocoaPods repository..."
            pod repo update && break
            sleep 5
          done

      - name: Install CocoaPods dependencies with retry
        working-directory: ios
        run: |
          for i in {1..5}; do
            echo "Attempt $i: Running pod install..."
            pod install --repo-update && break
            echo "Retry in 10s..."
            sleep 10
          done

      # --- Build (unsigned) ---
      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      # --- Package IPA ---
      - name: Create Payload and IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 ../FlutterIpaExport.ipa Payload/
          ls -la ../FlutterIpaExport.ipa

      - name: Check IPA size
        run: |
          if [ -f "build/ios/FlutterIpaExport.ipa" ]; then
            SIZE=$(stat -f%z "build/ios/FlutterIpaExport.ipa")
            echo "IPA file size: $((SIZE / 1024 / 1024)) MB"
          else
            echo "ERROR: IPA file not found!"
            exit 1
          fi

      - name: Update outdated packages (optional)
        run: flutter pub outdated

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterIpaExport.ipa
          path: build/ios/FlutterIpaExport.ipa
          retention-days: 7
